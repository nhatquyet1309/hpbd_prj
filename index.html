<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật - My Melody Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff0f3;
            background-image: radial-gradient(#ffccd5 1px, transparent 1px);
            background-size: 20px 20px;
            color: #d63384;
            overflow-x: hidden;
        }

        .melody-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #ff85a1;
            box-shadow: 0 15px 30px rgba(255, 133, 161, 0.3);
            border-radius: 40px;
        }

        .btn-pink {
            background: linear-gradient(135deg, #ff85a1, #f76384);
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-pink:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 5px 15px rgba(247, 99, 132, 0.4);
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .hidden { display: none; }

        .wish-item {
            background: #fff;
            border: 2px solid #ffe1e8;
            border-left: 6px solid #ff85a1;
            border-radius: 15px;
            margin-bottom: 1.2rem;
            padding: 1.2rem;
            transition: all 0.3s ease;
        }

        .wish-item:hover {
            transform: translateX(5px);
            border-color: #ff85a1;
        }

        /* Music control animation */
        @keyframes pulse-pink {
            0% { box-shadow: 0 0 0 0 rgba(255, 133, 161, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 133, 161, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 133, 161, 0); }
        }
        .music-active {
            animation: pulse-pink 2s infinite;
            background-color: #ff85a1 !important;
            color: white !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff0f3; }
        ::-webkit-scrollbar-thumb { background: #ff85a1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Audio Element -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/11/audio_4098a3628e.mp3?filename=music_for_video-happy-birthday-to-you-piano-version-13976.mp3" type="audio/mpeg">
    </audio>

    <!-- Floating Music Button -->
    <button onclick="toggleMusic()" id="music-btn" class="fixed top-6 right-6 z-50 p-4 rounded-full bg-white border-2 border-[#ff85a1] text-[#ff85a1] shadow-lg transition-all duration-500">
        <svg id="music-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
        </svg>
    </button>

    <!-- Login Selection Screen -->
    <div id="login-screen" class="w-full max-w-xl text-center">
        <div class="mb-8 floating overflow-hidden rounded-[2.5rem] border-4 border-[#ff85a1] shadow-2xl bg-white">
            <img src="https://twinkleglory.com.au/cdn/shop/collections/my-melody-plush-toys-gifts-online-australia-9605384_1920x512.png?v=1773100487" 
                 alt="My Melody Banner" 
                 class="w-full h-auto block object-cover">
        </div>
        
        <h1 class="text-4xl font-bold mb-4 text-[#d63384]">Happy Birthday! 🎀</h1>
        <p class="mb-10 text-pink-500 font-medium">Chào mừng bạn đến với hòm thư bí mật của Our Princess</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-4">
            <button onclick="showScreen('guest-screen')" class="w-full py-5 rounded-full btn-pink font-bold text-xl shadow-lg">
                Guest 💌
            </button>
            <button onclick="showScreen('owner-login-screen')" class="w-full py-5 rounded-full bg-white border-4 border-[#ff85a1] text-[#ff85a1] font-bold text-xl hover:bg-pink-50 transition-all shadow-lg">
                Our Princess 👑
            </button>
        </div>
    </div>

    <!-- Owner Login Password Screen -->
    <div id="owner-login-screen" class="hidden w-full max-w-md melody-card p-10">
        <h2 class="text-2xl font-bold mb-8 text-center">Dành riêng cho Công chúa 🌸</h2>
        <input type="password" id="owner-pass" placeholder="Nhập mật khẩu bí mật..." class="w-full p-4 rounded-2xl border-2 border-pink-200 mb-6 focus:outline-none focus:border-pink-500 transition-all text-center">
        <div class="flex flex-col gap-3">
            <button onclick="checkOwnerPassword()" class="w-full py-4 rounded-full btn-pink font-bold text-lg">Mở khóa hộp thư</button>
            <button onclick="showScreen('login-screen')" class="py-2 text-gray-400 font-semibold hover:text-pink-400">Quay lại</button>
        </div>
    </div>

    <!-- Guest Write Wish Screen -->
    <div id="guest-screen" class="hidden w-full max-w-lg melody-card p-10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Viết lời thương yêu ✨</h2>
            <button onclick="showScreen('login-screen')" class="text-pink-300 hover:text-pink-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="space-y-6">
            <div>
                <label class="block mb-2 font-bold ml-1">Tên của bạn:</label>
                <input type="text" id="guest-name" placeholder="Một cái tên gợi nhớ đến bạn" class="w-full p-4 rounded-2xl border-2 border-pink-100 focus:outline-none focus:border-pink-300 bg-pink-50/30">
            </div>
            <div>
                <label class="block mb-2 font-bold ml-1">Lời chúc:</label>
                <textarea id="guest-msg" rows="5" placeholder="Hãy giúp nquyt hoàn thiện món quà nho nhỏ cho ngày đặc biệt của bcam nhé..." class="w-full p-4 rounded-2xl border-2 border-pink-100 focus:outline-none focus:border-pink-300 bg-pink-50/30"></textarea>
            </div>
            <button onclick="submitWish()" id="submit-btn" class="w-full py-4 rounded-full btn-pink font-bold text-lg">Gửi quà đi 🎈</button>
        </div>
    </div>

    <!-- Owner Dashboard Screen -->
    <div id="owner-screen" class="hidden w-full max-w-3xl melody-card p-10 min-h-[600px] flex flex-col">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b-2 pb-6 border-pink-100 gap-4">
            <div class="text-center md:text-left">
                <h2 class="text-3xl font-bold">Hộp Thư Sinh Nhật 🎂</h2>
                <p class="text-pink-400">Những món quà tinh thần dành cho em!</p>
            </div>
            <button onclick="logout()" class="px-6 py-2 rounded-full bg-pink-100 text-pink-600 font-bold hover:bg-pink-200 transition-colors">Đăng xuất</button>
        </div>
        
        <div id="wishes-container" class="space-y-4 overflow-y-auto flex-grow pr-2 max-h-[60vh]">
            <!-- Wishes will appear here -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'melody-birthday-prod';

        let currentUser = null;
        const OWNER_PASSWORD = "anhyeuemvclchucmungsinhnhatcongchuacuaanh"; 

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => { currentUser = user; });

        // Navigation & Logic
        window.showScreen = (id) => {
            ['login-screen', 'owner-login-screen', 'guest-screen', 'owner-screen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if (id === 'owner-screen') loadWishes();
        };

        window.checkOwnerPassword = () => {
            const val = document.getElementById('owner-pass').value;
            if (val === OWNER_PASSWORD) {
                showScreen('owner-screen');
                document.getElementById('owner-pass').value = '';
            } else {
                showMessageBox("Hổng đúng rồi Princess ơi! Thử lại nha 🐰", "error");
            }
        };

        window.logout = () => showScreen('login-screen');

        window.toggleMusic = () => {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (music.paused) {
                music.play().catch(() => showMessageBox("Bấm lại để phát nhạc nhé!", "info"));
                btn.classList.add('music-active');
            } else {
                music.pause();
                btn.classList.remove('music-active');
            }
        };

        // Firestore Actions
        window.submitWish = async () => {
            if (!currentUser) return;
            const name = document.getElementById('guest-name').value.trim();
            const message = document.getElementById('guest-msg').value.trim();

            if (!name || !message) {
                showMessageBox("Điền đầy đủ mới gửi được quà nè!", "error");
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = "Đang gửi tâm tình...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'wishes'), {
                    name, message, timestamp: serverTimestamp()
                });
                showMessageBox("Gửi thành công! Chúc em sinh nhật vui vẻ 💖");
                document.getElementById('guest-name').value = '';
                document.getElementById('guest-msg').value = '';
                setTimeout(() => showScreen('login-screen'), 2000);
            } catch (e) {
                showMessageBox("Lỗi rồi, gửi lại sau nha!", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Gửi lời chúc 🎈";
            }
        };

        let unsub = null;
        function loadWishes() {
            if (!currentUser) return;
            if (unsub) unsub();

            const container = document.getElementById('wishes-container');
            container.innerHTML = '<p class="text-center py-10 animate-pulse text-pink-400">Đang mở hộp thư bí mật...</p>';

            unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'wishes'), (snap) => {
                const wishes = [];
                snap.forEach(doc => wishes.push(doc.data()));
                wishes.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                container.innerHTML = '';
                if (wishes.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 text-gray-400">Chưa có lời chúc nào hết... Hãy chờ nhé! 🍓</div>';
                    return;
                }

                wishes.forEach(w => {
                    const el = document.createElement('div');
                    el.className = 'wish-item';
                    const date = w.timestamp ? new Date(w.timestamp.seconds * 1000).toLocaleString('vi-VN') : 'Vừa mới đây';
                    el.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-lg text-pink-600">💌 ${w.name}</span>
                            <span class="text-[10px] bg-pink-50 text-pink-400 px-2 py-1 rounded-full">${date}</span>
                        </div>
                        <p class="text-gray-700 leading-relaxed italic">"${w.message}"</p>
                    `;
                    container.appendChild(el);
                });
            }, (err) => {
                container.innerHTML = '<p class="text-red-400 text-center">Lỗi kết nối database.</p>';
            });
        }

        function showMessageBox(text, type = "success") {
            const box = document.createElement('div');
            box.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl text-white font-bold z-[100] transition-all duration-500 animate-bounce ${type === 'success' ? 'bg-pink-500' : 'bg-red-400'}`;
            box.textContent = text;
            document.body.appendChild(box);
            setTimeout(() => {
                box.style.opacity = '0';
                setTimeout(() => box.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
